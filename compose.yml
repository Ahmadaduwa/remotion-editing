services:
  remotion-render:
    build: .
    container_name: remotion-render
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      - OLLAMA_URL=${OLLAMA_URL}
      - OLLAMA_MODEL=${OLLAMA_MODEL}
      - PIXABAY_API_KEY=${PIXABAY_API_KEY}
      - WHISPER_MODE=cpu
      - MAX_CONCURRENT_RENDERS=1
    volumes:
      - /home/aduwa/share/videos:/app/input:ro
      - /home/aduwa/share/edited_videos:/app/output
      - /home/aduwa/projects/editing/remotion-blank/data:/app/data
      - /home/aduwa/projects/editing/remotion-blank/assets:/app/assets
      - /home/aduwa/projects/editing/remotion-blank/public:/app/public
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "6"
          memory: "4G"
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

